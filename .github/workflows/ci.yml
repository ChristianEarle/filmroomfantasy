name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Build & Type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend:
    name: Backend (Type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci || npm ci

      - name: Type-check
        working-directory: server
        run: npx tsc --noEmit

  deploy:
    name: Deploy to Cloudflare
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 0dc32f5bf8763383e2672dcf5bba7a0b
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://filmroom-api.earle2001.workers.dev/api

      - name: Set up landing page as homepage
        run: |
          cd build
          cp index.html app.html
          cp ../landing.html index.html
          # Create directory-based routes so Cloudflare Pages serves the SPA
          # for each app route (e.g. /trade-analyzer -> trade-analyzer/index.html)
          for route in board team matchup waivers game-slate trends research playoff-predictor trade-analyzer draft-rankings all-players pricing settings profile home login register forgot-password; do
            mkdir -p "$route"
            cp app.html "$route/index.html"
          done

      - name: Install backend dependencies
        working-directory: server
        run: npm ci || npm ci

      - name: Apply migrations
        working-directory: server
        run: npx wrangler d1 migrations apply filmroom-db --remote --env=""

      - name: Deploy Worker
        working-directory: server
        run: npx wrangler deploy --env=""

      - name: Deploy Pages
        run: npx wrangler pages deploy build --project-name=filmroom --commit-message="CI deploy ${{ github.sha }}"
